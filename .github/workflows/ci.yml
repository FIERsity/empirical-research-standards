name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - run: uv sync --locked --all-groups
      - run: uv run pytest
      - run: uv run python skills/apply-empirical-standards/scripts/check_environment.py
      - run: uv run ruff check .
      - run: uv run mypy
      - run: uv build

  r-causal-backends:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.2"
          use-public-rspm: true
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
      - run: Rscript -e 'install.packages("renv"); renv::restore(project="r", prompt=FALSE)'
      - run: uv sync --locked --all-groups
      - run: uv run pytest tests/test_r_causal_backends.py
